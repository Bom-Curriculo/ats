# =============================================================================
# Override de DESENVOLVIMENTO
# Uso: ./run-dev.sh  (docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build)
#
# Características:
#   - Hot reload em frontend, backend e bot (código via bind-mount)
#   - Portas expostas no host para depuração
# =============================================================================
services:

  frontend:
    build:
      target: development
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build:
      target: development
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html

  nginx:
    image: nginx:1.28-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/backend.conf:/etc/nginx/conf.d/default.conf:ro

  bot:
    build:
      target: development
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./bot:/app
      - /app/.venv

  rabbitmq:
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    ports:
      - "6379:6379"
