version: 2
updates:
  # Frontend (npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "development"
    schedule:
      interval: "weekly"
    groups:
      frontend-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(frontend)"
    ignore:
      # typescript-eslint@8.x exige typescript <6.1.0; liberar quando o
      # peer dependency for atualizado, evitando ERESOLVE no npm ci.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # Backend - assets/vite (npm)
  - package-ecosystem: "npm"
    directory: "/backend"
    target-branch: "development"
    schedule:
      interval: "weekly"
    groups:
      backend-npm-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(backend)"

  # Backend (composer / PHP)
  - package-ecosystem: "composer"
    directory: "/backend"
    target-branch: "development"
    schedule:
      interval: "weekly"
    groups:
      backend-composer-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(backend)"

  # Mobile (pub / Dart-Flutter)
  - package-ecosystem: "pub"
    directory: "/mobile"
    target-branch: "development"
    schedule:
      interval: "weekly"
    groups:
      mobile-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(mobile)"

  # Bot (uv / Python)
  - package-ecosystem: "uv"
    directory: "/bot"
    target-branch: "development"
    schedule:
      interval: "weekly"
    groups:
      bot-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(bot)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "development"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
