server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        # Resolve "backend" em runtime via DNS interno do Docker (127.0.0.11).
        # Assim o nginx sobe mesmo que o backend ainda não esteja no ar e tolera
        # o container reiniciar/trocar de IP (retorna 502 em vez de crashar).
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream backend:9000;
        fastcgi_pass $backend_upstream;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 120;
    }

    # Bloqueia dotfiles (exceto .well-known)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
