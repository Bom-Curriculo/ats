# =============================================================================
# Base — definições comuns a dev e prod.
# NÃO suba este arquivo sozinho. Use os scripts:
#   ./run-dev.sh   -> docker-compose.yml + docker-compose.dev.yml
#   ./run-prod.sh  -> docker-compose.yml + docker-compose.prod.yml
# =============================================================================
name: bomcurriculo

services:

  frontend:
    container_name: bomcurriculo-frontend
    build:
      context: ./frontend
    env_file:
      - path: ./frontend/.env
        required: false
    networks:
      - bomcurriculo

  backend:
    container_name: bomcurriculo-backend
    build:
      context: ./backend
    working_dir: /var/www/html
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Sobrescreve os hosts do .env para os nomes de serviço da rede docker
      # (o .env do projeto costuma apontar para 127.0.0.1, que não funciona aqui)
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER:-bomcurriculo}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-bomcurriculo}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    expose:
      - "9000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bomcurriculo

  nginx:
    container_name: bomcurriculo-nginx
    depends_on:
      - backend
    networks:
      - bomcurriculo

  bot:
    container_name: bomcurriculo-bot
    build:
      context: ./bot
    env_file:
      - path: ./bot/.env
        required: false
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER:-bomcurriculo}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-bomcurriculo}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - bomcurriculo

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: bomcurriculo-rabbitmq
    hostname: bomcurriculo-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-bomcurriculo}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-bomcurriculo}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - bomcurriculo

  redis:
    image: redis:7-alpine
    container_name: bomcurriculo-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - bomcurriculo

networks:
  bomcurriculo:
    driver: bridge

volumes:
  rabbitmq_data:
  redis_data:
