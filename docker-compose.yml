services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atsdatabase}
      POSTGRES_USER: ${POSTGRES_USER:-ats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ats}

    ports:
      - "${POSTGRES_PORT:-5434}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    networks:
      - bomcurriculo

  redis:
    image: redis:7-alpine
    restart: unless-stopped

    command:
      - redis-server
      - --appendonly
      - "yes"

    ports:
      - "${REDIS_PORT:-6379}:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - bomcurriculo

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    restart: unless-stopped
    working_dir: /var/www/html

    env_file:
      - ./backend/.env

    ports:
      - "${BACKEND_PORT:-9000}:9000"

    volumes:
      - backend_storage:/var/www/html/storage

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://localhost:9000/up
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

    networks:
      - bomcurriculo

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile

    restart: unless-stopped

    env_file:
      - ./bot/.env

    ports:
      - "${BOT_PORT:-8000}:8000"

    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

    networks:
      - bomcurriculo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL_CONNECT: /api

    restart: unless-stopped

    ports:
      - "${FRONTEND_PORT:-5173}:80"

    depends_on:
      backend:
        condition: service_healthy
      bot:
        condition: service_healthy

    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://localhost/healthz
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

    networks:
      - bomcurriculo

networks:
  bomcurriculo:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_storage: