services:

  frontend:
    container_name: bomcurriculo-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    # nginx interno serve o build estático na porta 80
    ports:
      - "5173:80"
    mem_limit: 64m
    networks:
      - bomcurriculo

  backend:
    container_name: bomcurriculo-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    env_file:
      - path: ./backend/.env
        required: false
    depends_on:
      rabbitmq:
        condition: service_healthy
    expose:
      - "9000"
    mem_limit: 256m
    networks:
      - bomcurriculo

  nginx:
    image: nginx:1.28-alpine
    container_name: bomcurriculo-nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    mem_limit: 64m
    networks:
      - bomcurriculo

  bot:
    container_name: bomcurriculo-bot
    build:
      context: ./bot
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - path: ./bot/.env
        required: false
    depends_on:
      rabbitmq:
        condition: service_healthy
    mem_limit: 256m
    networks:
      - bomcurriculo

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: bomcurriculo-rabbitmq
    restart: always
    hostname: bomcurriculo-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-bomcurriculo}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-bomcurriculo}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
      # Bloqueia publishers em 50% do mem_limit do container (não da RAM do host)
      # antes de o container ser morto por OOM.
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: "0.5"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    mem_limit: 384m
    networks:
      - bomcurriculo

networks:
  bomcurriculo:
    driver: bridge

volumes:
  rabbitmq_data:
