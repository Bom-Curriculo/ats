services:
  frontend:
    container_name: bomcurriculo-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - path: ./frontend/.env
        required: false
    networks:
      - bomcurriculo

  backend:
    container_name: bomcurriculo-backend
    build:
      context: ./backend
      dockerfile: dockerfile
    restart: always
    ports:
      - "8080:9000"   # API PHP (http://localhost:8080)
    env_file:
      - path: ./backend/.env
        required: false
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - bomcurriculo

  bot:
    container_name: bomcurriculo-bot
    build:
      context: ./bot
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"   # API FastAPI (http://localhost:8000)
    env_file:
      - path: ./bot/.env
        required: false
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - bomcurriculo

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: bomcurriculo-rabbitmq
    restart: always
    hostname: bomcurriculo-rabbitmq
    ports:
      - "5672:5672"    # AMQP (conexão dos serviços)
      - "15672:15672"  # Management UI (http://localhost:15672)
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-bomcurriculo}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-bomcurriculo}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - bomcurriculo

networks:
  bomcurriculo:
    driver: bridge

volumes:
  rabbitmq_data:
