# =============================================================================
# Base — definições comuns a dev e prod.
# NÃO suba este arquivo sozinho. Use os scripts:
#   ./run-dev.sh   -> docker-compose.yml + docker-compose.dev.yml
#   ./run-prod.sh  -> docker-compose.yml + docker-compose.prod.yml
# =============================================================================
name: bomcurriculo

services:

  frontend:
    container_name: bomcurriculo-frontend
    build:
      context: ./frontend
    env_file:
      - path: ./frontend/.env
        required: false
    networks:
      - bomcurriculo

  backend:
    container_name: bomcurriculo-backend
    build:
      context: ./backend
    working_dir: /var/www/html
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Sobrescreve os hosts do .env para os nomes de serviço da rede docker
      # (o .env do projeto costuma apontar para 127.0.0.1, que não funciona aqui)
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    expose:
      - "9000"
    depends_on:
      redis:
        condition: service_started
    networks:
      - bomcurriculo

  nginx:
    container_name: bomcurriculo-nginx
    depends_on:
      - backend
    networks:
      - bomcurriculo

  bot:
    container_name: bomcurriculo-bot
    build:
      context: ./bot
    env_file:
      - path: ./bot/.env
        required: false
    networks:
      - bomcurriculo

  redis:
    image: redis:7-alpine
    container_name: bomcurriculo-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - bomcurriculo

networks:
  bomcurriculo:
    driver: bridge

volumes:
  redis_data:
